<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conectando transmisión...</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
}

.loader{
border:5px solid #222;
border-top:5px solid #1f6feb;
border-radius:50%;
width:50px;
height:50px;
animation:giro 1s linear infinite;
margin-top:20px;
}

@keyframes giro{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>

<script>

/* bloquear popups */

window.open = function(){ return null; };

/* consumir clics */

document.addEventListener("click",function(e){
e.stopPropagation();
},true);

</script>

</head>

<body>

<h3>🔗 Conectando transmisión...</h3>
<div class="loader"></div>

<script>

const params = new URLSearchParams(location.search);
let r = params.get("r");

if(r){

let url = atob(r).trim();

/* pequeña espera para perder eventos de anuncio */

setTimeout(()=>{
location.replace(url);
},1500);

}

</script>

</body>
</html>
